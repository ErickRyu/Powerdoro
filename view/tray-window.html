<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
        <link rel="stylesheet" href="styles/tray-window.css">
        <script src="../tray-window-renderer.js"></script>
    </head>
    <body>
        <div class="tray-card" id="tray-card">
            <header class="topbar">
                <div class="session-chip">POWERDORO</div>
                <div class="drag-handle" aria-hidden="true"></div>
            </header>

            <div id="health-banner" class="health-banner" role="status" aria-live="polite">
                <span id="health-text" class="health-text">Checking app health...</span>
                <div class="health-actions">
                    <button type="button" id="recover-btn" class="health-btn">Recover</button>
                    <button type="button" id="restart-btn" class="health-btn danger">Restart</button>
                </div>
            </div>

            <section class="timer-stage" aria-live="polite">
                <div class="ring-track"></div>
                <div class="ring" id="timer-ring"></div>
                <div class="timer-content">
                    <div id="timer-display" class="timer-display">00:00</div>
                    <div id="timer-status" class="timer-status">READY TO FOCUS</div>
                </div>
            </section>

            <form id="time-form" class="time-form">
                <div class="input-wrap">
                    <input type="number" id="time" min="1" max="180" step="1" autofocus placeholder="Custom minutes">
                    <button type="submit" id="submit_btn" class="submit-btn" title="Start timer">
                        <img src="../res/img/play-button.svg" id="btn_img" width="22" height="22" alt="Start">
                    </button>
                </div>
                <span id="error-msg" class="error-msg"></span>
            </form>

            <div class="presets" id="preset-group">
                <button type="button" class="preset-btn" data-minutes="25">25m</button>
                <button type="button" class="preset-btn" data-minutes="50">50m</button>
                <button type="button" class="preset-btn" data-minutes="90">90m</button>
            </div>

            <footer class="controls">
                <button type="button" id="stats-btn" class="icon-btn" title="Statistics">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                </button>
                <button type="button" id="settings-btn" class="icon-btn" title="Settings">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
                <button type="button" id="stop-btn" class="icon-btn" title="Stop">
                    <img src="../res/img/stop.svg" width="18" height="18" alt="Stop">
                </button>
                <button type="button" id="exit-btn" class="icon-btn danger" title="Exit">
                    <img src="../res/img/minus-circle.svg" width="18" height="18" alt="Exit">
                </button>
            </footer>
        </div>
    </body>
</html>
